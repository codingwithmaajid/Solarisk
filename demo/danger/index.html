<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="solarisk-scenario" content="danger">
  <title>Solarisk Demo - Danger</title>
  <style>
    :root { color-scheme: dark; --bg:#0c0f14; --panel:#12161d; --text:#f4f6f8; --muted:#a4abb6; --line:#252b36; --danger:#f05d5e; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(240, 93, 94, 0.16), transparent 35%), var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      padding: 40px 20px;
    }
    main { max-width: 760px; margin: 0 auto; border: 1px solid var(--line); border-radius: 20px; padding: 28px; background: rgba(18,22,29,.94); }
    h1 { margin: 0 0 12px; font-size: 36px; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; border:1px solid rgba(240,93,94,.35); color: var(--danger); margin-bottom: 18px; }
    p { color: var(--muted); line-height: 1.7; }
    ul { margin: 18px 0 0; padding-left: 20px; color: var(--muted); line-height: 1.8; }
  </style>
</head>
<body>
  <main>
    <div class="pill">Scenario: danger</div>
    <h1>Recovery Phrase Trap</h1>
    <p>This page asks for a secret recovery phrase and private key. It is meant to classify as Dangerous every time.</p>
    <ul>
      <li>Enter your secret recovery phrase to unlock rewards</li>
      <li>Paste your private key to continue</li>
      <li>Do not trust any approval request from this page</li>
    </ul>
  </main>
</body>
</html>

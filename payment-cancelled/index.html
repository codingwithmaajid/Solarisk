<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - Solarisk</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0b0f17;
      color: #e8e9eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    main {
      width: min(100%, 420px);
      padding: 28px;
      border: 1px solid #2a2f3a;
      border-radius: 16px;
      background: #14181f;
      text-align: center;
    }

    .icon {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: rgba(234, 179, 8, 0.16);
      color: #eab308;
      font-size: 28px;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0;
      color: #9ca3af;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <div class="icon">!</div>
    <h1>Mock Payment Cancelled</h1>
    <p>No payment was made. You can return to the extension popup and continue scanning pages.</p>
  </main>
</body>
</html>

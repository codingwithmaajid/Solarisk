<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>Solarisk</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Page 1: DoDo Payments -->
  <div id="page-dodo" class="page active">
    <h1 class="logo">Solarisk</h1>
    <div class="buttons-container">
      <button id="btn-dodo" class="btn">
        <span>DoDo Payments</span>
      </button>
      <span class="divider">or</span>
      <button id="btn-skip" class="btn btn-muted">
        <span>Skip</span>
      </button>
    </div>
  </div>

  <!-- Page 2: Connect Wallet -->
  <div id="page-connect" class="page">
    <h1 class="logo logo-top">Solarisk</h1>
    <div class="connect-content">
      <div class="spacer"></div>
      <div class="connect-btn-container">
        <button id="btn-connect" class="btn">
          <span>connect</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Page 3: Dashboard / Panel -->
  <div id="page-dashboard" class="page" style="padding: 16px;">
    <div class="panel" style="position: relative;">
      <!-- Scanning Overlay -->
      <div id="scanning-overlay" class="scanning-overlay active">
        <div class="scanning-backdrop">
          <div class="scanning-text">
            <div class="spinner"></div>
            <span>Scanning page...</span>
          </div>
        </div>
        <div class="scan-line"></div>
      </div>

      <!-- Header -->
      <div class="panel-header">
        <div class="panel-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Solarisk</span>
        </div>
        <div id="status-badge" class="status-badge status-scanning">
          <div class="dot"></div>
          <span id="status-text">Scanning</span>
        </div>
      </div>

      <!-- Content -->
      <div id="panel-content" class="panel-content scanning">
        <!-- Activity Detected -->
        <section class="animate-in" style="animation-delay: 0.1s;">
          <h3 class="section-title">Activity Detected</h3>
          <div class="section-card activity-card">
            <div class="activity-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/>
                <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/>
                <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>
              </svg>
            </div>
            <p id="activity-text" class="activity-text">Wallet connection request detected</p>
          </div>
        </section>

        <!-- AI Analysis -->
        <section class="animate-in" style="animation-delay: 0.2s;">
          <h3 class="section-title">AI Analysis</h3>
          <div class="section-card section-card-light">
            <p id="analysis-text" class="analysis-text">This dApp is requesting access to view your wallet address and token balances.</p>
          </div>
        </section>

        <!-- Recommendation -->
        <section class="animate-in" style="animation-delay: 0.25s;">
          <h3 class="section-title">Recommendation</h3>
          <div class="section-card section-card-light">
            <p id="advice-text" class="analysis-text">Review the request before proceeding.</p>
          </div>
        </section>

        <!-- Risk Level -->
        <section class="animate-in" style="animation-delay: 0.3s;">
          <h3 class="section-title">Risk Level</h3>
          <div id="risk-card" class="risk-card risk-warning">
            <svg id="risk-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span id="risk-text" class="risk-text">Warning</span>
          </div>
        </section>
      </div>

      <!-- Actions -->
      <div id="panel-actions" class="panel-actions disabled">
        <button id="btn-continue" class="btn btn-muted">Continue</button>
        <button id="btn-execute" class="btn btn-primary">Protect & Execute</button>
        <button id="btn-pay-execute" class="btn">Pay & Execute</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

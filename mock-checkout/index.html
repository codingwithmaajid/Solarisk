<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solarisk Mock Checkout</title>
  <style>
    :root {
      --background: #0b0f17;
      --panel: #14181f;
      --panel-soft: #1a1f27;
      --text: #e8e9eb;
      --muted: #9ca3af;
      --border: #2a2f3a;
      --accent: #22c55e;
      --warning: #eab308;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    main {
      width: min(100%, 440px);
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    header {
      padding: 22px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--warning);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    section {
      padding: 22px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(42, 47, 58, 0.7);
      color: var(--muted);
      font-size: 14px;
    }

    .row strong {
      color: var(--text);
      font-weight: 600;
      text-align: right;
    }

    .notice {
      margin: 18px 0;
      padding: 12px;
      border: 1px solid rgba(234, 179, 8, 0.25);
      border-radius: 10px;
      background: rgba(234, 179, 8, 0.08);
      color: #f5d76e;
      font-size: 13px;
      line-height: 1.5;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button,
    a {
      width: 100%;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button {
      background: var(--accent);
      color: #06120a;
      border-color: var(--accent);
    }

    a {
      background: var(--panel-soft);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">Mock Checkout</p>
      <h1>Solarisk Pay & Execute</h1>
    </header>

    <section>
      <div class="row">
        <span>Product</span>
        <strong>Protected execution pass</strong>
      </div>
      <div class="row">
        <span>Network</span>
        <strong>Solana stablecoin demo</strong>
      </div>
      <div class="row">
        <span>Amount</span>
        <strong>$1.00 USDC</strong>
      </div>
      <div class="row">
        <span>Session</span>
        <strong id="session-id">mock</strong>
      </div>

      <div class="notice">
        This is a hackathon mock payment page. No real payment is collected, and no blockchain transaction is submitted.
      </div>

      <div class="actions">
        <button id="pay-button" type="button">Complete Mock Payment</button>
        <a href="/payment-cancelled">Cancel</a>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id") || "mock";
    document.getElementById("session-id").textContent = sessionId;

    document.getElementById("pay-button").addEventListener("click", () => {
      window.location.href = `/payment-success?session_id=${encodeURIComponent(sessionId)}&mock=true`;
    });
  </script>
</body>
</html>
